name: Build and Push FactSet Loader Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download FactSet binary assets
        run: |
          curl -H "Authorization: token ${{ secrets.FACTSET_ASSETS_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            -L "https://api.github.com/repos/stainly/fundy_factset_assets/contents/FDSLoader64" \
            -o FDSLoader64
          curl -H "Authorization: token ${{ secrets.FACTSET_ASSETS_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            -L "https://api.github.com/repos/stainly/fundy_factset_assets/contents/cacert.pem" \
            -o cacert.pem
          chmod +x FDSLoader64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fundy_factset_loader
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
